<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart & Checkout — BottleRush</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍺</text></svg>" />
</head>
<body>

<!-- ── Navbar ── -->
<nav class="navbar">
  <a href="/" class="nav-logo">Bottle<span>Rush</span></a>
  <ul class="nav-links">
    <li><a href="/">Home</a></li>
    <li><a href="/menu">Menu</a></li>
    <li><a href="/cart">Cart</a></li>
  </ul>
  <a href="/cart" class="nav-cart">
    🛒 Cart
    <span class="cart-badge" id="cart-badge">0</span>
  </a>
  <button class="nav-toggle" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="page">
  <div class="cart-layout" id="cart-layout">

    <!-- ── Left: Cart Items + Address ── -->
    <div class="cart-items-section">

      <h1 style="font-family:var(--font-display); font-size:clamp(1.6rem,4vw,2.2rem); margin-bottom:1.5rem;">
        Your Cart
      </h1>

      <!-- Cart Items -->
      <div id="cart-items-list">
        <!-- Rendered by JS -->
      </div>

      <!-- Delivery Address Section -->
      <div class="map-section" id="address-section" style="display:none;">
        <h3>📍 Delivery Address</h3>

        <!-- Leaflet Map -->
        <div style="position:relative;">
          <div id="map-container"></div>
          <div class="map-overlay-label">Drag pin to adjust location</div>
          <button class="gps-btn" id="gps-btn">📍 My Location</button>
        </div>

        <div style="margin-top:1rem; display:flex; flex-direction:column; gap:.8rem;">
          <div>
            <label style="font-size:.82rem; color:var(--text-muted); margin-bottom:.3rem; display:block;">Delivery Address</label>
            <input
              type="text" id="address-field"
              placeholder="Your address will appear here after GPS pin..."
            />
          </div>
          <div>
            <label style="font-size:.82rem; color:var(--text-muted); margin-bottom:.3rem; display:block;">Phone Number *</label>
            <input
              type="tel" id="phone-field"
              placeholder="10-digit mobile number"
              maxlength="10"
            />
          </div>
          <div>
            <label style="font-size:.82rem; color:var(--text-muted); margin-bottom:.3rem; display:block;">Delivery Instructions (optional)</label>
            <textarea
              id="instructions-field"
              placeholder="Gate code, landmark, floor number..."
              rows="2"
              style="resize:vertical;"
            ></textarea>
          </div>
        </div>
      </div>

    </div>

    <!-- ── Right: Order Summary ── -->
    <div class="cart-summary-section" id="summary-section" style="display:none;">
      <div class="summary-box">
        <h3>Order Summary</h3>

        <div class="summary-row">
          <span>Subtotal</span>
          <span id="summary-subtotal">₹0</span>
        </div>
        <div class="summary-row">
          <span>Delivery Fee</span>
          <span id="summary-delivery">₹49</span>
        </div>

        <div class="free-delivery-note" id="free-delivery-note" style="display:none;">
          🎉 You qualify for free delivery!
        </div>

        <div class="summary-row total">
          <span>Total</span>
          <span class="amount" id="summary-total">₹0</span>
        </div>

        <div style="margin-top:1rem; padding:.8rem; background:var(--surface); border-radius:var(--radius); font-size:.8rem; color:var(--text-muted); display:flex; align-items:center; gap:.5rem;">
          🕐 Estimated delivery: <strong style="color:var(--text);">30–45 min</strong>
        </div>

        <button
          class="btn btn-primary btn-block"
          id="place-order-btn"
          style="margin-top:1.2rem; padding:1rem;"
          onclick="placeOrder()">
          Place Order →
        </button>

        <p style="font-size:.75rem; color:var(--text-dim); text-align:center; margin-top:.8rem;">
          🔞 By ordering you confirm you are 21+ years of age
        </p>
      </div>
    </div>

  </div>
</div>

<script src="/js/app.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/js/map.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  renderCart();
});

function renderCart() {
  const items = Cart.get();
  const list = document.getElementById('cart-items-list');
  const addressSection = document.getElementById('address-section');
  const summarySection = document.getElementById('summary-section');

  if (!items.length) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🛒</div>
        <h3>Your cart is empty</h3>
        <p>Browse our menu and add some drinks!</p>
        <a href="/menu" class="btn btn-primary btn-sm" style="margin-top:1rem; display:inline-flex;">Browse Menu</a>
      </div>`;
    addressSection.style.display = 'none';
    summarySection.style.display = 'none';
    return;
  }

  addressSection.style.display = 'block';
  summarySection.style.display = 'block';

  list.innerHTML = items.map(item => `
    <div class="cart-item" id="cart-item-${item._id}">
      <div class="cart-item-emoji">${item.emoji || '🍶'}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-meta">${item.volume}${item.unit} · ${formatPrice(item.price)} each</div>
        <div class="qty-control" style="margin-top:.5rem;">
          <button class="qty-btn" onclick="changeQty('${item._id}', -1)">−</button>
          <span class="qty-num" id="qty-${item._id}">${item.qty}</span>
          <button class="qty-btn" onclick="changeQty('${item._id}', 1)">+</button>
          <button class="qty-btn" onclick="removeItem('${item._id}')" style="margin-left:.3rem; color:var(--red); border-color:var(--red);">🗑</button>
        </div>
      </div>
      <div class="cart-item-price">${formatPrice(item.price * item.qty)}</div>
    </div>
  `).join('');

  updateSummary();
}

function changeQty(id, delta) {
  Cart.updateQty(id, delta);
  renderCart();
}

function removeItem(id) {
  Cart.remove(id);
  renderCart();
  // Re-init map if still showing
  if (Cart.count() > 0 && !map) initMap();
}

function updateSummary() {
  const items = Cart.get();
  const subtotal = Cart.total();
  const deliveryFee = subtotal >= 500 ? 0 : 49;
  const total = subtotal + deliveryFee;

  document.getElementById('summary-subtotal').textContent = formatPrice(subtotal);
  document.getElementById('summary-delivery').textContent = deliveryFee === 0 ? 'FREE' : formatPrice(deliveryFee);
  document.getElementById('summary-total').textContent = formatPrice(total);

  const freeNote = document.getElementById('free-delivery-note');
  if (freeNote) freeNote.style.display = deliveryFee === 0 ? 'block' : 'none';
}

async function placeOrder() {
  const items = Cart.get();
  if (!items.length) return Toast.show('Your cart is empty', '');

  const addressField = document.getElementById('address-field');
  const phoneField = document.getElementById('phone-field');
  const instructionsField = document.getElementById('instructions-field');

  const lat = parseFloat(addressField.dataset.lat);
  const lng = parseFloat(addressField.dataset.lng);
  const formatted = addressField.dataset.formatted || addressField.value;
  const phone = phoneField.value.trim();

  if (!formatted || isNaN(lat)) {
    Toast.show('Please allow location or drag the pin on the map', '');
    return;
  }
  if (!phone || phone.length < 10) {
    Toast.show('Please enter a valid 10-digit phone number', '');
    phoneField.focus();
    return;
  }

  const btn = document.getElementById('place-order-btn');
  btn.textContent = 'Placing order...';
  btn.disabled = true;

  try {
    const res = await fetch(`${API_BASE}/api/orders`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        items: items.map(i => ({
          productId: i._id,
          name: i.name,
          qty: i.qty,
          price: i.price,
          emoji: i.emoji,
        })),
        address: { lat, lng, formatted },
        phone,
        deliveryInstructions: instructionsField.value.trim(),
      }),
    });

    const json = await res.json();
    if (!json.success) throw new Error(json.error);

    Cart.clear();
    window.location.href = `/order-confirm?id=${json.data.orderId}&total=${json.data.total}`;
  } catch (err) {
    Toast.show(`Order failed: ${err.message}`, '');
    btn.textContent = 'Place Order →';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
