<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Placed — BottleRush</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍺</text></svg>" />
</head>
<body>

<!-- ── Navbar ── -->
<nav class="navbar">
  <a href="/" class="nav-logo">Bottle<span>Rush</span></a>
  <ul class="nav-links">
    <li><a href="/">Home</a></li>
    <li><a href="/menu">Menu</a></li>
    <li><a href="/cart">Cart</a></li>
  </ul>
  <a href="/cart" class="nav-cart">
    🛒 Cart
    <span class="cart-badge" id="cart-badge">0</span>
  </a>
  <button class="nav-toggle" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="page confirm-page">
  <div class="confirm-card fade-in">
    <div class="confirm-icon">🎉</div>
    <h1>Order Placed!</h1>
    <p>Your drinks are being packed and will be on their way shortly.</p>

    <div class="order-id-box">
      Order ID: <span id="order-id">—</span>
    </div>

    <div class="eta-badge">
      🕐 Estimated delivery: <span id="eta">30–45 min</span>
    </div>

    <div style="background:var(--surface); border-radius:var(--radius); padding:1rem; margin-bottom:1.5rem; text-align:left;">
      <div style="font-size:.78rem; color:var(--text-muted); margin-bottom:.5rem; text-transform:uppercase; letter-spacing:.05em;">Order Total</div>
      <div style="font-family:var(--font-display); font-size:1.6rem; color:var(--gold);" id="order-total">—</div>
    </div>

    <div style="display:flex; flex-direction:column; gap:.8rem;">
      <a href="/menu" class="btn btn-primary btn-block">
        🍺 Order More
      </a>
      <a href="/" class="btn btn-outline btn-block">
        ← Back to Home
      </a>
    </div>

    <p style="margin-top:1.5rem; font-size:.75rem; color:var(--text-dim);">
      🔞 Please drink responsibly. BottleRush does not serve minors.
    </p>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const orderId = params.get('id');
  const total = params.get('total');

  if (orderId) {
    document.getElementById('order-id').textContent = orderId;
  }
  if (total) {
    document.getElementById('order-total').textContent = '₹' + parseInt(total).toLocaleString('en-IN');
  }
});
</script>
</body>
</html>
